<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Urban Thread AI Training Dashboard</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; line-height: 1.5; padding: 2rem; max-width: 1200px; margin: 0 auto; } .header { text-align: center; margin-bottom: 2rem; } .logo { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; } .subtitle { color: #374151; font-size: 1.1rem; } .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; } @media (max-width: 768px) { .container { grid-template-columns: 1fr; } } .card { background: white; border-radius: 0.5rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); } .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: #111827; } .input-group { margin-bottom: 1rem; } .input-label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; } .input-field { width: 100%; padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; font-family: inherit; } .input-field:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); } .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s; gap: 8px; } .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; } .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); } .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; } .btn-secondary:hover { background: #e5e7eb; } .analysis-box { background: #f3f4f6; border-radius: 0.5rem; padding: 1rem; margin-top: 1rem; border-left: 4px solid #2563eb; } .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #d1d5db; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .progress-container { margin: 1.5rem 0; } .progress-bar { height: 12px; background: #e5e7eb; border-radius: 0.5rem; overflow: hidden; margin-bottom: 0.5rem; } .progress-fill { height: 100%; background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); border-radius: 0.5rem; transition: width 0.6s ease; } .progress-info { display: flex; justify-content: space-between; font-size: 0.875rem; color: #374151; } .hidden { display: none; } .toast { position: fixed; bottom: 20px; right: 20px; background: white; color: #111827; padding: 1rem; border-radius: 0.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); display: flex; align-items: center; gap: 1rem; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 400px; } .toast.show { transform: translateY(0); opacity: 1; } .toast-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; } </style> </head> <body> <header class="header"> <div class="logo">🏢 Urban Thread AI Training</div> <div class="subtitle">Institutional-Grade Stock Analysis Training Platform</div> </header>
<div class="progress-container">
    <div class="progress-info">
        <span>Progress: <strong id="current-count">11</strong>/100 corrections</span>
        <span>Goal: Institutional-Grade AI</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progress-bar" style="width: 11%"></div>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2 class="card-title">📈 Analyze Stock with Rex</h2>
        <div class="input-group">
            <label class="input-label">Enter Ticker Symbol</label>
            <input type="text" id="tickerInput" class="input-field" placeholder="AAPL, TSLA, NVDA, MSFT" value="NVDA">
        </div>
        
        <button class="btn btn-primary" onclick="analyzeStock()" style="width: 100%;">
            <span id="analyze-text">Run Rex Analysis</span>
            <span id="analyze-loading" class="loading hidden"></span>
        </button>
        
        <div id="analysisResult" class="hidden">
            <div class="analysis-box">
                <h3 style="margin-bottom: 10px;">🤖 AI Analysis Result</h3>
                <div id="analysisContent"></div>
                <button class="btn btn-secondary" onclick="showCorrectionForm()" style="margin-top: 15px;">
                    ✏️ Spot an Error? Correct AI
                </button>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h2 class="card-title">✏️ Capture Correction</h2>
        <div id="correctionForm" class="hidden">
            <div class="input-group">
                <label class="input-label">Ticker</label>
                <input type="text" id="correctionTicker" class="input-field" readonly>
            </div>
            
            <div class="input-group">
                <label class="input-label">Rule Category</label>
                <select id="ruleType" class="input-field">
                    <option value="">Select rule category</option>
                    <option value="TREND-GUARD">TREND-GUARD</option>
                    <option value="VALUATION-GUARD">VALUATION-GUARD</option>
                    <option value="D/E Context">D/E Context</option>
                    <option value="System Architecture">System Architecture</option>
                    <option value="Risk Calibration">Risk Calibration</option>
                </select>
            </div>
            
            <div class="input-group">
                <label class="input-label">AI's Mistake</label>
                <textarea id="mistake" class="input-field" rows="3" placeholder="Describe what the AI got wrong..."></textarea>
            </div>
            
            <div class="input-group">
                <label class="input-label">Your Correction</label>
                <textarea id="correction" class="input-field" rows="3" placeholder="Provide the correct analysis with specific rules..."></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="saveCorrection()" style="width: 100%; margin-top: 1rem;">
                💾 Save Correction
            </button>
        </div>
        
        <div id="noAnalysisMessage">
            <p style="color: #374151; text-align: center; padding: 20px;">
                First analyze a stock using Rex, then correct any errors here.
            </p>
        </div>
    </div>
</div>

<div style="text-align: center; margin-top: 1.5rem;">
    <button class="btn btn-secondary" onclick="exportData()">
        📥 Export All Corrections
    </button>
</div>

<div id="toast" class="toast">
    <div class="toast-icon">✅</div>
    <div>
        <div id="toast-title" style="font-weight: 600;"></div>
        <div id="toast-message" style="font-size: 0.875rem;"></div>
    </div>
</div>

<script>
    let corrections = JSON.parse(localStorage.getItem('utCorrections') || '[]');
    let currentTicker = '';
    
    function showToast(title, message) {
        document.getElementById('toast-title').textContent = title;
        document.getElementById('toast-message').textContent = message;
        document.getElementById('toast').classList.add('show');
        setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
    }
    
    function updateProgress() {
        const count = corrections.length;
        document.getElementById('current-count').textContent = count;
        document.getElementById('progress-bar').style.width = count + '%';
    }
    
    function loadRecentCorrections() {
        const container = document.getElementById('recentCorrections');
        if (!container) return;
        
        if (corrections.length === 0) {
            container.innerHTML = '<p style="color: #374151; text-align: center; padding: 20px;">No corrections yet. Analyze stocks and correct AI errors to build training data.</p>';
            return;
        }
        
        const recent = corrections.slice(-5).reverse();
        container.innerHTML = recent.map(c => `
            <div class="correction-item">
                <div class="correction-header">
                    <span class="correction-ticker">${c.ticker}</span>
                    <span class="correction-time">${new Date(c.timestamp).toLocaleDateString()}</span>
                </div>
                <div class="correction-rule">${c.rule}</div>
                <div class="correction-content">
                    <strong>Mistake:</strong> ${c.mistake.substring(0, 100)}...<br>
                    <strong>Correction:</strong> ${c.correction.substring(0, 100)}...
                </div>
            </div>
        `).join('');
    }
    
    async function analyzeStock() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
        if (!ticker) {
            showToast('Error', 'Please enter a ticker symbol');
            return;
        }
        
        currentTicker = ticker;
        document.getElementById('analyze-text').classList.add('hidden');
        document.getElementById('analyze-loading').classList.remove('hidden');
        
        try {
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            const mockData = {
                'NVDA': { price: '$950.02', pe: '60.5', technical: '78/100', trend: 'Bullish', recommendation: 'BUY', risk: 'HIGH', analysis: 'NVDA shows strong AI-driven growth with expanding margins. P/E elevated but justified by growth trajectory.' },
                'TSLA': { price: '$175.50', pe: '45.2', technical: '65/100', trend: 'Neutral', recommendation: 'HOLD', risk: 'MEDIUM', analysis: 'TSLA facing margin pressure but maintaining EV leadership. Delivery growth slowing.' },
                'AAPL': { price: '$215.80', pe: '28.3', technical: '82/100', trend: 'Bullish', recommendation: 'BUY', risk: 'LOW', analysis: 'AAPL strong ecosystem with services growth offsetting hardware slowdown.' },
                'MSFT': { price: '$425.30', pe: '35.8', technical: '85/100', trend: 'Bullish', recommendation: 'BUY', risk: 'LOW', analysis: 'MSFT Azure growth strong, Office 365 stable, AI integration across products.' }
            };
            
            const data = mockData[ticker] || {
                price: '$XXX.XX', pe: 'XX.X', technical: 'XX/100', trend: 'Neutral', recommendation: 'HOLD', risk: 'MEDIUM',
                analysis: `Analysis for ${ticker} would be generated by Rex AI.`
            };
