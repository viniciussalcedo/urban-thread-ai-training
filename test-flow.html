<!DOCTYPE html>
<html>
<head>
    <title>Urban Thread AI - TEST</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .test { background: #f0f0f0; padding: 20px; margin: 10px; }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <h1>🧪 Urban Thread AI Flow Test</h1>
    
    <div class="test">
        <h3>Test 1: Button exists</h3>
        <button id="testBtn" onclick="runTest()">Run Test Flow</button>
        <div id="result1"></div>
    </div>
    
    <div class="test">
        <h3>Test 2: analyzeStock function</h3>
        <div id="result2"></div>
    </div>
    
    <div class="test">
        <h3>Test 3: Mock data</h3>
        <div id="result3"></div>
    </div>
    
    <script>
        function runTest() {
            // Test 1: Button
            document.getElementById('result1').innerHTML = 
                '<span class="pass">✅ Button click registered</span>';
            
            // Test 2: analyzeStock function
            if (typeof analyzeStock === 'function') {
                document.getElementById('result2').innerHTML = 
                    '<span class="pass">✅ analyzeStock() function exists</span>';
                // Run it
                document.getElementById('tickerInput').value = 'AAPL';
                analyzeStock();
            } else {
                document.getElementById('result2').innerHTML = 
                    '<span class="fail">❌ analyzeStock() not found</span>';
            }
            
            // Test 3: Mock data
            if (typeof getMockRexAnalysis === 'function') {
                document.getElementById('result3').innerHTML = 
                    '<span class="pass">✅ Mock data function exists</span>';
            } else {
                document.getElementById('result3').innerHTML = 
                    '<span class="fail">❌ Mock data function missing</span>';
            }
        }
        
        // Auto-run tests
        setTimeout(runTest, 1000);
    </script>
    
    <!-- Include actual dashboard functions -->
    <script>
        // Copy analyzeStock and getMockRexAnalysis from main dashboard
        async function analyzeStock() {
            console.log('TEST: analyzeStock called');
            const ticker = document.getElementById('tickerInput')?.value || 'NVDA';
            alert(`TEST: Rex would analyze ${ticker}\nPrice: $167.52 | P/E: 34.09`);
            document.getElementById('analysisResult').style.display = 'block';
            document.getElementById('analysisContent').innerHTML = 
                `<p><strong>TEST ANALYSIS:</strong> ${ticker} shows strong fundamentals.</p>`;
            return true;
        }
        
        async function getMockRexAnalysis(ticker) {
            return `<p>Mock analysis for ${ticker}</p>`;
        }
    </script>
    
    <!-- Dashboard elements -->
    <input type="text" id="tickerInput" value="NVDA" placeholder="Ticker">
    <div id="analysisResult" style="display:none; background:#e0f7fa; padding:20px; margin-top:20px;">
        <div id="analysisContent"></div>
    </div>
</body>
</html>
